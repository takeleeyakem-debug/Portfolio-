<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Account - Ascenda Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="gradient-bg"></div>

    <nav class="navbar glass-effect">
        <div class="nav-container">
            <img src="https://images.unsplash.com/photo-1612831663458-bde950c9763d?w=200" alt="Ascenda Logo" class="logo neon-hover">
            <div class="nav-right">
                <select id="languageToggle" class="neon-select">
                    <option value="en">🇬🇧 English</option>
                    <option value="am">🇪🇹 አማርኛ</option>
                </select>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card futuristic-card">
            <div class="auth-header">
                <div class="verify-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1 class="gradient-text" id="verifyTitle">Verify Your Account</h1>
                <p id="verifySubtitle">Enter the 4-digit code sent to your device</p>
                <p class="demo-note">🔑 Demo: Use code <span class="neon-text">1234</span></p>
            </div>

            <form id="verifyForm" class="auth-form">
                <div class="otp-container">
                    <input type="text" id="code" maxlength="4" placeholder="1234" class="otp-input" required>
                </div>

                <div id="verifyError" class="error-message"></div>

                <button type="submit" class="neon-btn-glow full-width" id="verifyBtn">
                    Verify Account <i class="fas fa-check-circle"></i>
                </button>

                <p class="auth-footer">
                    <span id="resendText">Didn't receive code?</span>
                    <a href="#" class="neon-link" id="resendLink">Resend</a>
                </p>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

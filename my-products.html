<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products - Ascenda</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="gradient-bg"></div>

    <nav class="navbar glass-effect">
        <div class="nav-container">
            <img src="https://images.unsplash.com/photo-1612831663458-bde950c9763d?w=200" alt="Ascenda Logo" class="logo neon-hover">
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="marketplace.html" class="nav-link">Marketplace</a>
                <a href="dashboard.html" class="nav-link">Dashboard</a>
            </div>
            <div class="nav-right">
                <a href="add-product.html" class="neon-btn-small">
                    <i class="fas fa-plus"></i> <span id="addNewBtn">Add New</span>
                </a>
                <select id="languageToggle" class="neon-select">
                    <option value="en">🇬🇧 English</option>
                    <option value="am">🇪🇹 አማርኛ</option>
                </select>
                <button id="logoutBtn" class="neon-btn-outline-small">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="manage-products-header">
        <h1 class="gradient-text" id="myProductsTitle">My Products</h1>
        <p id="myProductsSubtitle">Manage your digital products</p>
    </div>

    <div class="products-management-container">
        <div class="products-grid" id="myProductsGrid"></div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content futuristic-card">
            <span class="close-modal">&times;</span>
            <h2 class="gradient-text" id="editModalTitle">Edit Product</h2>
            <form id="editForm" class="product-form">
                <input type="hidden" id="editProductId">
                
                <div class="form-group">
                    <label for="editTitle">Title</label>
                    <input type="text" id="editTitle" required class="neon-input">
                </div>

                <div class="form-group">
                    <label for="editCategory">Category</label>
                    <select id="editCategory" class="neon-select" required>
                        <option value="ebooks">📚 E-books</option>
                        <option value="courses">🎓 Online Courses</option>
                        <option value="templates">🎨 Web Templates</option>
                        <option value="graphics">🖼️ Graphics</option>
                        <option value="audio">🎵 Audio</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="editDescription">Description</label>
                    <textarea id="editDescription" rows="4" required class="neon-input"></textarea>
                </div>

                <div class="form-group">
                    <label for="editPrice">Price ($)</label>
                    <input type="number" id="editPrice" step="0.01" required class="neon-input">
                </div>

                <div class="form-group">
                    <label for="editImageUrl">Image URL</label>
                    <input type="url" id="editImageUrl" required class="neon-input">
                </div>

                <div class="form-group">
                    <label for="editDownloadLink">Download Link</label>
                    <input type="url" id="editDownloadLink" required class="neon-input">
                </div>

                <button type="submit" class="neon-btn-glow full-width">Update Product</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
